<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="logo">T</div>
        <nav class="nav-links">
            <a href="#">Contacts</a>
            <a href="#">About Me</a>
            <div class="social-icons">
                <span>f</span>
                <span>i</span>
                <span>x</span>
            </div>
        </nav>
    </header>

    <main class="gallery-grid">
        <div class="grid-item large clickable">
            <img src="https://picsum.photos/800/800?random=1" alt="Artwork">
        </div>

        <div class="sub-grid">
            <div class="grid-item clickable">
                <img src="https://picsum.photos/400/500?random=2" alt="Artwork">
            </div>
            <div class="grid-item clickable">
                <img src="https://picsum.photos/400/500?random=3" alt="Artwork">
            </div>
            <div class="grid-item clickable">
                <img src="https://picsum.photos/400/500?random=4" alt="Artwork">
            </div>
        </div>

        <div class="grid-item medium clickable">
            <img src="https://picsum.photos/600/400?random=5" alt="Artwork">
        </div>
        <div class="grid-item text-block">
            <h3>Garamond</h3>
            <p>Experimental typography and digital textures exploring the intersection of classical serif forms and modern glitch art.</p>
        </div>
        <div class="grid-item pattern-block clickable">
            <img src="https://picsum.photos/400/400?random=6" alt="Artwork">
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Artist Portfolio | Built with Style</p>
    </footer>

</body>
</html>
